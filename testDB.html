<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Visualisation Salles & Utilisateurs</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body { background-color: #222; color: white; }
    .floating-frame { border-radius: 10px; box-shadow: black 0px 0px 20px; background-color: rgba(30, 30, 30, 0.9); }
    .table-dark { --bs-table-bg: transparent; }
</style>
</head>

<body class="p-5" style="background-image: url(/templates/src/background2.png); background-size: cover; background-attachment: fixed;">

<div class="container floating-frame p-4">

    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom border-secondary pb-3">
        <h1 class="text-warning mb-0">État de la Base de Données</h1>
        <div>
            <a href="/" class="btn btn-outline-light me-2">Retour au site</a>
            <button id="btn-refresh" class="btn btn-primary me-2">Actualiser Tout</button>
            <button id="btn-clean-db" class="btn btn-danger shadow">Vider la BDD</button>
        </div>
    </div>

    <!-- SALLES -->
    <h4 class="text-info mb-3">1. Utilisateurs actifs (Par Salle)</h4>
    <div class="card bg-dark border-secondary mb-5">
        <div class="card-body p-0">
            <table class="table table-dark table-striped align-middle mb-0">
                <thead>
                    <tr>
                        <th>ID Salle</th>
                        <th>Utilisateurs connectés</th>
                    </tr>
                </thead>
                <tbody id="rooms-content"></tbody>
            </table>
        </div>
    </div>

    <!-- USERS -->
    <h4 class="text-info mb-3">2. Tous les Comptes</h4>
    <div class="card bg-dark border-secondary mb-5">
        <div class="card-body p-0">
            <table class="table table-dark table-striped align-middle mb-0">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Pseudo</th>
                        <th>Email</th>
                        <th>Rôle</th>
                    </tr>
                </thead>
                <tbody id="users-content"></tbody>
            </table>
        </div>
    </div>

    <!-- MARKERS -->
    <h4 class="text-info mb-3">3. Marqueurs</h4>
    <div class="card bg-dark border-secondary">
        <div class="card-body p-0">
            <table class="table table-dark table-striped align-middle mb-0">
                <thead>
                    <tr>
                        <th>ID Salle</th>
                        <th>Marqueurs</th>
                    </tr>
                </thead>
                <tbody id="markers-content"></tbody>
            </table>
        </div>
    </div>

</div>

<script>
const roomsTbody = document.getElementById('rooms-content');
const usersTbody = document.getElementById('users-content');
const markersTbody = document.getElementById('markers-content');
const btnRefresh = document.getElementById('btn-refresh');

// ---------- UTIL ----------
function formatTime(seconds) {
    const min = Math.floor(seconds / 60);
    const sec = Math.floor(seconds % 60);
    return `${min < 10 ? '0'+min : min}:${sec < 10 ? '0'+sec : sec}`;
}

async function safeFetch(url, options = {}) {
    try {
        const res = await fetch(url, options);

        if (!res.ok) {
            throw new Error(`HTTP ${res.status}`);
        }

        return await res.json();
    } catch (err) {
        console.error(`Erreur fetch ${url}:`, err);
        return null;
    }
}

// ---------- ROOMS ----------
async function loadRooms() {
    roomsTbody.innerHTML = '<tr><td colspan="2">Chargement...</td></tr>';

    const data = await safeFetch('/api/rooms-users');

    if (!data) {
        roomsTbody.innerHTML = '<tr><td colspan="2" class="text-danger">Erreur API Rooms</td></tr>';
        return;
    }

    if (data.length === 0) {
        roomsTbody.innerHTML = '<tr><td colspan="2">Aucune donnée</td></tr>';
        return;
    }

    const map = {};
    data.forEach(row => {
        if (!map[row.room_id]) map[row.room_id] = [];
        map[row.room_id].push(row);
    });

    roomsTbody.innerHTML = '';

    for (const [roomId, users] of Object.entries(map)) {
        let html = '<ul class="list-group list-group-flush">';

        users.forEach(u => {
            html += `<li class="list-group-item bg-transparent text-white border-secondary">
                        ${u.username} <span class="text-info">(${u.email})</span>
                     </li>`;
        });

        html += '</ul>';

        const tr = document.createElement('tr');
        tr.innerHTML = `<td>#${roomId}</td><td>${html}</td>`;
        roomsTbody.appendChild(tr);
    }
}

// ---------- USERS ----------
async function loadUsers() {
    usersTbody.innerHTML = '<tr><td colspan="4">Chargement...</td></tr>';

    const data = await safeFetch('/api/all-users');

    if (!data) {
        usersTbody.innerHTML = '<tr><td colspan="4" class="text-danger">Erreur API Users</td></tr>';
        return;
    }

    usersTbody.innerHTML = '';

    data.forEach(user => {
        const tr = document.createElement('tr');

        tr.innerHTML = `
            <td>${user.user_id}</td>
            <td>${user.username}</td>
            <td>${user.email}</td>
            <td>${user.role}</td>
        `;

        usersTbody.appendChild(tr);
    });
}

// ---------- MARKERS ----------
async function loadMarkers() {
    markersTbody.innerHTML = '<tr><td colspan="2">Chargement...</td></tr>';

    const data = await safeFetch('/api/all-markers');

    if (!data) {
        markersTbody.innerHTML = '<tr><td colspan="2" class="text-danger">Erreur API Markers</td></tr>';
        return;
    }

    const map = {};
    data.forEach(m => {
        if (!map[m.room_id]) map[m.room_id] = [];
        map[m.room_id].push(m);
    });

    markersTbody.innerHTML = '';

    for (const [roomId, markers] of Object.entries(map)) {
        let html = '<ul class="list-group list-group-flush">';

        markers.forEach(m => {
            html += `<li class="list-group-item bg-transparent text-white border-secondary">
                        [${formatTime(m.timestamp_seconds)}] 
                        <b>${m.username || 'Utilisateur supprimé'}</b> :
                        ${m.comment}
                     </li>`;
        });

        html += '</ul>';

        const tr = document.createElement('tr');
        tr.innerHTML = `<td>#${roomId}</td><td>${html}</td>`;
        markersTbody.appendChild(tr);
    }
}

// ---------- CLEAN DB ----------
document.getElementById('btn-clean-db').addEventListener('click', async () => {
    if (!confirm("Supprimer toute la base de données ?")) return;

    const res = await fetch('/api/clean-db', { method: 'POST' });

    if (res.ok) {
        alert("BDD nettoyée");
        refreshAll();
    } else {
        alert("Erreur lors du nettoyage");
    }
});

// ---------- GLOBAL ----------
function refreshAll() {
    loadRooms();
    loadUsers();
    loadMarkers();
}

btnRefresh.addEventListener('click', refreshAll);

refreshAll();
</script>

</body>
</html>
