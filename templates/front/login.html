<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>StreamSquad - Authentification</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #222; color: white; }
        .center-position { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .floating-frame { border-radius: 10px; box-shadow: black 0px 0px 20px; backdrop-filter: blur(6px); }
        .form-control { background-color: #e3f0ff; border: black; }
        .nav-flex { display: flex; align-items: center; justify-content: center; z-index: 1; }
        .nav-flex>* { display: inline-table; white-space: nowrap; }
        #login-nav { position: fixed; left: 95%; top: 30px; transform: translate(-100%, 0%); height: 50px; }
    </style>
</head>

<body style="background-image: url(/templates/src/background2.png);background-size: 100%;">
    <nav id="login-nav" class="floating-frame nav-flex p-2">
        <div class="input-group">
            <button href="/" id="access-index" class="btn btn-warning js-access-button">CONTINUER SANS COMPTE</button>
            <button href="/signup" id="access-signup" class="btn btn-success js-access-button">S'INSCRIRE</button>
        </div>
    </nav>
    <div class=" text-center center-position col-md-7">
        <div class="container floating-frame p-4 pt-5 pb-5" style="max-width: 500px;">
            <h1 class="text-primary mb-1 ">Se connecter à</h1>
            <h1 class="text-primary mb-4">StreamSquad</h1>

            <form id="login-form">
                <div class="row justify-content-center">
                    <div class="">
                        <input type="text" id="login-identifier" class="form-control mb-3" placeholder="Votre email ou pseudonyme" required>
                        <input type="password" id="login-password" class="form-control mb-3" placeholder="Votre mot de passe" required>

                        <button type="submit" class="btn btn-primary w-100">Se connecter</button>
                        <a id="create-account" class="js-access-button" href="/signup">Vous n'avez pas encore de compte ?</a>
                        
                        <div id="error-msg" class="text-danger mt-3" style="min-height: 24px;"></div>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
        const js_access_button = document.querySelectorAll('.js-access-button');
        js_access_button.forEach(element => {
            element.addEventListener('click', () => {
                window.location.href = element.getAttribute("href");
            });
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            // CORRECTIF ICI : On gère l'identifiant (pseudo OU email)
            const identifier = document.getElementById('login-identifier').value.trim();
            const password = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('error-msg');

            errorDiv.textContent = "Connexion...";

            // On vérifie si c'est un email (contient un @)
            const isEmail = identifier.includes('@');
            const payload = isEmail 
                ? { email: identifier, password: password } 
                : { username: identifier, password: password };

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('streamSquad_user', data.username);
                    window.location.href = '/'; 
                } else {
                    errorDiv.textContent = data.message;
                }
            } catch (err) {
                console.error(err);
                errorDiv.textContent = "Erreur serveur.";
            }
        });
    </script>
</body>
</html>
